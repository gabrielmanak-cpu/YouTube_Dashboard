name: Daily YouTube Scrape

on:
  schedule:
    - cron: '0 13 * * *'  # 9am EST (UTC-4) every day
  workflow_dispatch:        # also lets you trigger it manually anytime

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-api-python-client

      - name: Run scraper
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python youtube_scraper.py

      - name: Commit updated dashboard
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git pull --rebase
          git add dashboard.html youtube_data.csv
          git commit -m "Daily update $(date +'%Y-%m-%d')" || echo "No changes"
          git push
